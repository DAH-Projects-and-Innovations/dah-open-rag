services:

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persistance de la base vectorielle et des fichiers uploadés
      - chroma_data:/app/data/chroma_db
      - uploads_data:/app/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # Laisse le temps de charger les modèles

  frontend:
    build:
      context: ./frontend
      args:
        # Pointe vers le backend accessible depuis le navigateur
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  uploads_data:
