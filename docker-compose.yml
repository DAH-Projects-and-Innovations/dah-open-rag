# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Config de base (mode HYBRID par défaut)
#
# Mode HYBRID (Mistral ou Gemini) :
#   docker compose up --build
#
# Mode FREE (Ollama local) :
#   docker compose -f docker-compose.yml -f docker-compose.free.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RAG_CONFIG: ${RAG_CONFIG:-hybrid}
    volumes:
      - chroma_data:/app/data/chroma_db
      - uploads_data:/app/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # Laisse le temps de charger les modèles d'embedding

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  uploads_data:
