# Modèle d'embedding (gratuit)
embedder:
  name: "sentence_transformers"
  params:
    model_name: "BAAI/bge-large-en-v1.5" # 1024 dimensions
    device: "cpu" # Utiliser "cuda" si GPU disponible
    normalize_embeddings: true
    batch_size: 32

# Base de données vectorielle (gratuite, locale)
vector_store:
  name: "chroma"
  params:
    collection_name: "documents"
    persist_directory: "./data/chroma_db"
    # Paramètres ChromaDB
    distance_metric: "cosine" # ou "l2", "ip"

# Composant de récupération
retriever:
  name: "vector_retriever"
  params:
    search_type: "similarity" # ou "mmr" pour Maximum Marginal Relevance
    score_threshold: 0.0 # Seuil de similarité minimum (0-1)
    top_k: 20 # Nombre de documents à fetcher avant filtrage

# Reranking (optionnel, gratuit)
reranker:
  name: "cross_encoder"
  params:
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    device: "cpu"
    batch_size: 16

# Gestionnaire de prompts
prompt_managers:
  name: "default"
  params: {}

# Modèle de génération (Ollama local)
