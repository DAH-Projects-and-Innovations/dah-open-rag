llm:
 name: "huggingface"
 params:
   model: "HuggingFaceH4/zephyr-7b-beta"
   api_key: "${HF_TOKEN}"
   temperature: 0.7
   max_tokens: 1000
   top_p: 0.9
   enable_citations: false
   system_prompt_template: "rag_system"
   user_prompt_template: "rag_user"
   prevent_hallucinations: true

# Configuration du pipeline
pipeline_config:
  name: "free_rag_pipeline"
  version: "1.0.0"
  prompt_version: "1.0" # Version des templates de prompts
  default_top_k: 5
  default_rerank_top_k: 3
  enable_caching: true
  log_level: "INFO"
